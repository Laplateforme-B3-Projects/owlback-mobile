services:
  expo:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8081:8081'
    volumes:
      - .:/app
      - /app/node_modules/
    stdin_open: true
    tty: true

    environment:
      - EXPO_TOKEN=${EXPO_TOKEN}
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
      - EXPO_DEBUG=true
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
